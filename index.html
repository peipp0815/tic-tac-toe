<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css" />
    <script src="js.js" defer></script>
  </head>
  <body>
    <div id="container">
      <div id="ticTacToeField">
        <div>
          <button class="ticTacToeBtn" data-yAxis="0" data-xAxis="0"></button>
        </div>
        <div>
          <button class="ticTacToeBtn" data-yAxis="0" data-xAxis="1"></button>
        </div>
        <div>
          <button class="ticTacToeBtn" data-yAxis="0" data-xAxis="2"></button>
        </div>
        <div>
          <button class="ticTacToeBtn" data-yAxis="1" data-xAxis="0"></button>
        </div>
        <div>
          <button class="ticTacToeBtn" data-yAxis="1" data-xAxis="1"></button>
        </div>
        <div>
          <button class="ticTacToeBtn" data-yAxis="1" data-xAxis="2"></button>
        </div>
        <div>
          <button class="ticTacToeBtn" data-yAxis="2" data-xAxis="0"></button>
        </div>
        <div>
          <button class="ticTacToeBtn" data-yAxis="2" data-xAxis="1"></button>
        </div>
        <div>
          <button class="ticTacToeBtn" data-yAxis="2" data-xAxis="2"></button>
        </div>
      </div>
      <p id="result"></p>
    </div>
  </body>
</html>
